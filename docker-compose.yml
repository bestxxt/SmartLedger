version: '3.8'

services:
  backend:
    image: ghcr.io/bestxxt/smartledger-backend:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - sqlite_data:/app/prisma/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=fallback_secret_for_dev
      # We map the database URL to the volume path
      - DATABASE_URL=file:/app/prisma/data/dev.db

  frontend:
    image: ghcr.io/bestxxt/smartledger-frontend:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
